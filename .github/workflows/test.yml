name: Deploy Test

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: divio-test-environment
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Point Divio Test environment to PR branch
        run: >
          curl -sS --fail -X PATCH
          --data "branch=${{ github.head_ref }}"
          --header "Authorization: Token ${{ secrets.API_TOKEN }}"
          https://api.divio.com/apps/v3/environments/${{ secrets.TEST_ENVIRONMENT_UUID }}/

      - name: Deploy test application
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
          TEST_ENVIRONMENT_UUID: ${{ secrets.TEST_ENVIRONMENT_UUID }}
        run: |
          set -euo pipefail

          # Trigger deployment and capture UUID
          DEPLOY_UUID=$(curl -sS --fail -X POST \
            --data "environment=${TEST_ENVIRONMENT_UUID}" \
            --header "Authorization: Token ${API_TOKEN}" \
            https://api.divio.com/apps/v3/deployments/ \
            | jq -r '.uuid')

          if [ -z "${DEPLOY_UUID}" ] || [ "${DEPLOY_UUID}" = "null" ]; then
            echo "Failed to start test deployment (no UUID returned)."
            exit 1
          fi

          echo "Started test deployment: ${DEPLOY_UUID}"

          # Poll until success is true/false (non-null)
          for i in {1..120}; do
            RESP=$(curl -sS --fail \
              --header "Authorization: Token ${API_TOKEN}" \
              "https://api.divio.com/apps/v3/deployments/${DEPLOY_UUID}/")

            STATUS=$(echo "$RESP" | jq -r '.status // empty')
            SUCCESS=$(echo "$RESP" | jq -r '.success')

            echo "Test deployment status: ${STATUS:-unknown}"

            if [ "$SUCCESS" = "true" ]; then
              echo "Test deployment succeeded."
              exit 0
            fi

            if [ "$SUCCESS" = "false" ]; then
              echo "Test deployment failed. Check Divio deployment logs for UUID: ${DEPLOY_UUID}"
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for test deployment ${DEPLOY_UUID}"
          exit 1
